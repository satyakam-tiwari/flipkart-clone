<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Flipkart Clone - Checkout</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Navbar -->
  <header class="navbar">
    <div class="logo" onclick="window.location.href='index.html'">Flipkart</div>
    <input type="text" placeholder="Search for Products, Brands and more" class="search-bar" />
    <div class="nav-icons">
      <button onclick="window.location.href='orders.html'">My Orders</button>
      <button onclick="window.location.href='index.html'">Home</button>
    </div>
  </header>

  <main class="checkout-container">
    <!-- Billing Details -->
    <section class="checkout-box">
      <h2>Billing Details</h2>
      <form id="checkout-form">
        <label>Full Name:</label>
        <input type="text" id="name" required />

        <label>Phone Number:</label>
        <input type="text" id="phone" required />

        <label>Address:</label>
        <textarea id="address" rows="3" required></textarea>

        <h2>Payment Method</h2>
        <div class="payment-options">
          <label><input type="radio" name="payment" value="COD" checked /> Cash on Delivery</label><br />
          <label><input type="radio" name="payment" value="Card" /> Debit / Credit Card</label><br />
          <label><input type="radio" name="payment" value="UPI" /> UPI</label>
        </div>

        <!-- Payment Inputs -->
        <div id="payment-details" style="margin-top:10px; display:none;">
          <div id="card-fields" style="display:none;">
            <label>Card Number:</label>
            <input type="text" placeholder="1234 5678 9012 3456" maxlength="16" />
            <label>Expiry Date:</label>
            <input type="month" />
            <label>CVV:</label>
            <input type="password" maxlength="3" />
          </div>
          <div id="upi-fields" style="display:none;">
            <label>UPI ID:</label>
            <input type="text" placeholder="example@upi" />
          </div>
        </div>

        <button type="submit" class="yellow-btn">Place Order</button>
      </form>
    </section>

    <!-- Order Summary -->
    <section class="checkout-box">
      <h2>Order Summary</h2>
      <ul id="summary-items"></ul>
      <h3>Total: ₹<span id="summary-total">0</span></h3>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
